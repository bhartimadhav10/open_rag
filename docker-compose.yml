services:
  openrag:
    build: .
    image: open-rag:latest
    container_name: openrag
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override these from .env if you want; defaults below are sane.
      OPENRAG_HOST: "0.0.0.0"
      OPENRAG_PORT: "8000"
    volumes:
      # Persistent state: index, INT8 model, session DB, ingested docs
      - ./data:/app/data
      # Optional: drop your source documents here and ingest at startup
      # - ./my_docs:/app/my_docs:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
